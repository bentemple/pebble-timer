name: Release

on:
  push:
    tags:
      - 'v*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          docker run --rm -v ${{ github.workspace }}:/pebble \
            --user root \
            ghcr.io/skylord123/docker-coredevices-pebble-tool:latest
          sudo chown -R $USER build/
          mv build/pebble.pbw build/pebble-timer.pbw

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: build/pebble-timer.pbw
